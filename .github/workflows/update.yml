name: Update IPTV Sources

on:
  schedule:
    - cron: '0 3 * * *'   # 每天 UTC 03:00（北京时间 11:00）
  workflow_dispatch:        # 支持手动触发

concurrency:
  group: iptv-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装 FFmpeg
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 安装依赖
      run: pip install -r requirements.txt

    - name: 配置 Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: 运行更新脚本
      run: python main.py

    - name: 提交并推送更新
      run: |
        git add data/output/
        if git diff --staged --quiet; then
          echo "没有变更，跳过提交"
        else
          CHANNEL_COUNT=$(grep -c '#EXTINF' data/output/iptv_collection.m3u || true)
          git commit -m "自动更新直播源 $(date +'%Y-%m-%d %H:%M:%S UTC') [${CHANNEL_COUNT}个频道]"
          git push origin main
        fi
